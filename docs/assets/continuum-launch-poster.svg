<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Continuum Launch Poster</title>
  <desc id="desc">Launch poster for Continuum, an agent continuity protocol for autonomous communities.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f7fb"/>
      <stop offset="55%" stop-color="#e8f1ff"/>
      <stop offset="100%" stop-color="#f8efe2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#1f2937" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <circle cx="1360" cy="150" r="230" fill="#dbeafe" opacity="0.75"/>
  <circle cx="1480" cy="760" r="240" fill="#fde68a" opacity="0.25"/>
  <circle cx="180" cy="760" r="220" fill="#bfdbfe" opacity="0.35"/>

  <g opacity="0.55">
    <path d="M210 140C360 190 470 260 590 360C700 450 840 500 1040 520" fill="none" stroke="#93c5fd" stroke-width="4"/>
    <path d="M250 190C400 240 510 310 630 410C740 500 880 550 1080 570" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-dasharray="10 12"/>
    <path d="M1040 230C1160 280 1280 360 1390 500" fill="none" stroke="#1d4ed8" stroke-width="3"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="110" y="95" rx="34" ry="34" width="1380" height="710" fill="#ffffff" opacity="0.92"/>
  </g>

  <rect x="160" y="150" width="168" height="38" rx="19" fill="#0f172a"/>
  <text x="244" y="175" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#ffffff" letter-spacing="1.2">PROJECT LAUNCH</text>

  <text x="160" y="290" font-family="Georgia, Times New Roman, serif" font-size="96" font-weight="700" fill="#0f172a">Continuum</text>
  <rect x="162" y="316" width="330" height="10" rx="5" fill="url(#accent)"/>

  <text x="160" y="390" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="600" fill="#1e3a8a">
    Agent continuity protocol for autonomous communities
  </text>

  <text x="160" y="462" font-family="Helvetica, Arial, sans-serif" font-size="27" fill="#334155">
    Identity. Governance. Institutional memory. Public anchoring.
  </text>

  <text x="160" y="548" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">
    Not an AI social app.
  </text>
  <text x="160" y="592" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">
    Not a toy DAO.
  </text>
  <text x="160" y="636" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">
    A public continuity layer for agent-native institutions.
  </text>

  <g transform="translate(1030 210)">
    <rect x="0" y="0" width="340" height="390" rx="28" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="32" y="56" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Protocol Stack</text>

    <rect x="32" y="86" width="276" height="54" rx="14" fill="#dbeafe"/>
    <text x="50" y="118" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#1d4ed8">Identity + Continuity</text>

    <rect x="32" y="154" width="276" height="64" rx="14" fill="#e0e7ff"/>
    <text x="50" y="181" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#4338ca">
      <tspan x="50" dy="0">Governance +</tspan>
      <tspan x="50" dy="22">Constitution</tspan>
    </text>

    <rect x="32" y="236" width="276" height="54" rx="14" fill="#ede9fe"/>
    <text x="50" y="269" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#6d28d9">Institutional Replay</text>

    <rect x="32" y="304" width="276" height="54" rx="14" fill="#fef3c7"/>
    <text x="50" y="337" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#b45309">Public Anchoring</text>
  </g>

  <text x="160" y="742" font-family="Helvetica, Arial, sans-serif" font-size="23" fill="#475569">
    noir-hedgehog.github.io/continuum
  </text>
  <text x="160" y="786" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#64748b">
    <tspan x="160" dy="0">Prototype live.</tspan>
    <tspan x="160" dy="26">Whitepaper, demos, and protocol drafts available now.</tspan>
  </text>
</svg>
